services:
  backend:
    build: .
    working_dir: /app/app/backend
    command: python api.py
    environment:
      - PYTHONPATH=/app:/app/app/backend
    ports:
      - "8080:8000"
    networks:
      - recipe-network

  frontend:
    build: .
    working_dir: /app/app/frontend
    command: python app.py
    ports:
      - "5050:5000"
    depends_on:
      - backend
    networks:
      - recipe-network

networks:
  recipe-network:
    driver: bridge