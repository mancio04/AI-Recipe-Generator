<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Recipe-Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="main-container">  
        <h1>Generate a recipe</h1>
        <p>Write available ingredients spaced by commas.</p>
        <form action="/input" method="POST" class="recipe-form">
            <label for="ingredients" class="form-label">Available ingredients:</label>
            <input type="text" id="ingredients" name="ingredients" 
                   placeholder="Es: egg, flour, milk" 
                   class="form-input"
                   required>    
            <button type="submit" class="submit-btn">Generate recipe</button>
        </form>
        {% if error %}
            <p class="error-message"> {{ error }}</p>
        {% endif %}
    </main>
</body>
</html>
