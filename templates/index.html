<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore di Ricette</title>
</head>
<body style="font-family: sans-serif; background-color: #fafafa; color: #333; margin: 0; padding: 20px;">

    <main style="max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        
        <h1 style="color: #2c3e50; margin-top: 0;">Genera una Ricetta</h1>
        <p style="color: #7f8c8d;">Inserisci gli ingredienti che hai a disposizione separati da una virgola.</p>

        <form action="/input" method="POST" style="margin-top: 20px;">
            <label Improvement for="ingredients" style="display: block; font-weight: bold; margin-bottom: 8px;">
                Ingredienti disponibili:
            </label>
            <input type="text" id="ingredients" name="ingredients" 
                   placeholder="Es: uova, farina, latte" 
                   style="width: 100%; padding: 12px; box-sizing: border-box; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;"
                   required>
            
            <button type="submit" style="background: #e67e22; color: white; padding: 12px 20px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold;">
                Genera Ricette
            </button>
        </form>
        
        {% if error %}
            <p style="color: #e74c3c; margin-top: 15px; font-weight: bold;"> {{ error }}</p>
        {% endif %}
    </main>

</body>
</html>
